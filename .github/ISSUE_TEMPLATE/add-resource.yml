name: Add Resource
description: Suggest a new resource for Expo + React Native DX
labels: ["enhancement", "good first issue"]
body:
  - type: input
    id: resource_name
    attributes:
      label: Resource name
    validations:
      required: true

  - type: input
    id: resource_url
    attributes:
      label: Resource URL (HTTPS)
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Docs & Upgrade Guides
        - Starter Kits & Templates
        - Navigation
        - State & Data
        - Backend & Auth
        - UI & Styling
        - Animation & Gestures
        - UX Libraries
        - Forms & Validation
        - Media & Camera
        - Device APIs
        - Accessibility & i18n
        - Push Notifications
        - Analytics & Monitoring
        - Monetization
        - MCP Integrations
        - Platform & Native Architecture
        - Build & Release
        - Testing & Quality
        - Performance & Profiling
        - Learning & Community
    validations:
      required: true

  - type: textarea
    id: why_valuable
    attributes:
      label: Why is this valuable?
      description: Explain in at least one sentence why this helps Expo/RN DX.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional context like maintenance signals or alternatives.
    validations:
      required: false

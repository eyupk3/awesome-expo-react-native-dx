name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate resource schema and duplicates
        run: npm run validate

      - name: Check staleness policy
        run: npm run stale

      - name: Regenerate README
        run: npm run readme:generate

      - name: Ensure generated files are committed
        run: git diff --exit-code README.md

      - name: Check links
        run: npm run link:check

      - name: Lint markdown
        run: npm run lint:md

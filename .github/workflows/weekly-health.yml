name: Weekly Health

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Stale check
        run: npm run stale

      - name: Link check
        run: npm run link:check

      - name: Markdown lint
        run: npm run lint:md

      - name: Open maintenance issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Weekly health check failed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              'Automated weekly health checks failed.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Please review stale resources, broken links, or lint errors and submit a fix PR.'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'maintenance'
            });

            const exists = issues.some((issue) => issue.title === title);
            if (!exists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['maintenance']
              });
            }
